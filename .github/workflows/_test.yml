name: Test (Reusable)

on:
  workflow_call:
    inputs:
      browser:
        description: Playwright browser to test with
        type: string
        default: chromium
      bust-browser-cache:
        description: Force fresh browser download (bypasses Docker cache)
        type: boolean
        default: false
      retention-days:
        description: Days to keep test artifacts
        type: number
        default: 7
      artifact-prefix:
        description: Prefix for artifact names
        type: string
        default: test-results

jobs:
  test:
    name: Test (${{ inputs.browser }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          target: test
          tags: paperjs:latest
          build-args: |
            BROWSER=${{ inputs.browser }}
            ${{ inputs.bust-browser-cache && format('CACHE_DATE={0}-{1}', github.run_id, github.run_attempt) || '' }}

      - name: Run tests
        id: run-tests
        run: |
          mkdir -p test-results
          docker run --rm -v "$(pwd)/test-results:/app/test-results" paperjs:latest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-prefix }}-${{ inputs.browser }}
          path: test-results/
          retention-days: ${{ inputs.retention-days }}

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results (${{ inputs.browser }})
          path: test-results/playwright-results.xml
          reporter: java-junit
          fail-on-error: false
